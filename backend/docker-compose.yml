version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: eduvilaasa_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eduvilaasa
    ports:
      - '5432:5432'
    volumes:
      - eduvilaasa_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: eduvilaasa_redis
    restart: unless-stopped
    ports:
      - '6379:6379'

volumes:
  eduvilaasa_pgdata:
