<div class="login-page">
  <div class="login-box">
    <div class="brand">
      <span class="logo">EduVilaasa</span>
      <p>School Management Portal</p>
    </div>

    @if (error()) {
      <div class="alert-error">{{ error() }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="login-form">
      <div class="field">
        <label>Phone Number or Email</label>
        <input [(ngModel)]="identifier" name="identifier" type="text" placeholder="9876543210 or you@school.edu" autocomplete="username" />
      </div>

      <div class="field">
        <label>Password</label>
        <div class="pw-wrapper">
          <input [(ngModel)]="password" name="password" [type]="showPwd() ? 'text' : 'password'" placeholder="••••••••" autocomplete="current-password" />
          <button type="button" class="pw-eye" (click)="showPwd.update(v => !v)" tabindex="-1">
            @if (showPwd()) {
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            } @else {
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            }
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" [disabled]="loading()">
        @if (loading()) { Signing in... } @else { Sign In }
      </button>
    </form>

    <div style="text-align:center;margin-top:16px">
      <a routerLink="/forgot-password" style="color:#7c3aed;font-size:13px">Forgot password?</a>
    </div>

    <p class="footer-note">Powered by <a href="https://vilaasalabs.com" target="_blank">Vilaasalabs</a></p>
  </div>
</div>
