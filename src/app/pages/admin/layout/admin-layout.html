<div class="admin-shell" [class.sidebar-open]="sidebarOpen()">

  <!-- Mobile top bar -->
  <div class="mobile-topbar">
    <button class="hamburger-btn" (click)="toggleSidebar()">☰</button>
    <span class="mobile-brand">Vilaasa<span class="mobile-accent">Labs</span></span>
  </div>

  <!-- Overlay (mobile only) -->
  <div class="sidebar-overlay" [class.visible]="sidebarOpen()" (click)="closeSidebar()"></div>

  <aside class="sidebar" [class.open]="sidebarOpen()">
    <div class="sidebar-brand">
      <span class="logo">V</span>
      <div>
        <p class="brand-name">Vilaasalabs</p>
        <p class="brand-sub">Admin Portal</p>
      </div>
    </div>

    <nav class="sidebar-nav">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="active"
          class="nav-item"
          (click)="closeSidebar()"
        >
          <span class="icon">{{ item.icon }}</span>
          {{ item.label }}
        </a>
      }
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="avatar">{{ auth.currentUser()?.name?.charAt(0) }}</div>
        <div>
          <p class="user-name">{{ auth.currentUser()?.name }}</p>
          <p class="user-role">{{ auth.currentUser()?.role }}</p>
        </div>
      </div>
      <div class="footer-actions">
        <button class="theme-toggle" (click)="theme.toggle()" [title]="theme.isDark() ? 'Switch to Light Mode' : 'Switch to Dark Mode'">
          {{ theme.isDark() ? '☀️' : '🌙' }}
          <span>{{ theme.isDark() ? 'Light' : 'Dark' }}</span>
        </button>
        <button class="logout-btn" (click)="auth.logout()">Logout</button>
      </div>
    </div>
  </aside>

  <main class="content">
    <router-outlet />
  </main>
</div>
