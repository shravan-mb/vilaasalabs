<div class="login-wrapper">
  <div class="login-card">
    <div class="brand">
      <span class="logo">V</span>
      <div>
        <h1>Vilaasalabs</h1>
        <p>Internal Admin Access</p>
      </div>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="field">
        <label>Phone Number or Email</label>
        <input
          type="text"
          [(ngModel)]="identifier"
          name="identifier"
          placeholder="9876543210 or admin@vilaasalabs.com"
          required
          autocomplete="username"
        />
      </div>

      <div class="field">
        <label>Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />
      </div>

      @if (error()) {
        <div class="error-msg">{{ error() }}</div>
      }

      <button type="submit" [disabled]="loading()">
        @if (loading()) { Signing in... } @else { Sign In }
      </button>
    </form>

    <div style="text-align:center;margin-top:12px">
      <a routerLink="/admin/forgot-password" style="color:#7c3aed;font-size:13px">Forgot password?</a>
    </div>
    <p class="back-link"><a href="/">← Back to vilaasalabs.com</a></p>
  </div>
</div>
