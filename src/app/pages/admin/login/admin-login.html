<div class="login-wrapper">
  <div class="login-card">
    <div class="brand">
      <span class="logo">V</span>
      <div>
        <h1>Vilaasalabs</h1>
        <p>Internal Admin Access</p>
      </div>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="field">
        <label>Phone Number or Email</label>
        <input
          type="text"
          [(ngModel)]="identifier"
          name="identifier"
          placeholder="9876543210 or admin@vilaasalabs.com"
          required
          autocomplete="username"
        />
      </div>

      <div class="field">
        <label>Password</label>
        <div class="pw-wrapper">
          <input [type]="showPwd() ? 'text' : 'password'" [(ngModel)]="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
          <button type="button" class="pw-eye" (click)="showPwd.set(!showPwd())" tabindex="-1">
            @if (showPwd()) {
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            } @else {
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            }
          </button>
        </div>
      </div>

      @if (error()) {
        <div class="error-msg">{{ error() }}</div>
      }

      <button type="submit" [disabled]="loading()">
        @if (loading()) { Signing in... } @else { Sign In }
      </button>
    </form>

    <div style="text-align:center;margin-top:12px">
      <a routerLink="/admin/forgot-password" style="color:#7c3aed;font-size:13px">Forgot password?</a>
    </div>
    <p class="back-link"><a href="/">← Back to vilaasalabs.com</a></p>
  </div>
</div>
